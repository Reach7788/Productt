<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        .product-page { padding: 40px 20px; }
        .filter-section { display: grid; grid-template-columns: 200px 1fr; gap: 30px; margin-bottom: 40px; }
        .filter-box { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); height: fit-content; position: sticky; top: 100px; }
        .filter-box h3 { font-size: 16px; margin-bottom: 15px; font-weight: bold; }
        .filter-category { margin-bottom: 20px; }
        .filter-category h4 { font-size: 13px; margin-bottom: 10px; font-weight: bold; color: #333; }
        .category-item { cursor: pointer; padding: 10px 12px; border-radius: 5px; margin-bottom: 5px; transition: all 0.3s; font-size: 14px; border-left: 3px solid transparent; color: #666; }
        .category-item:hover { background: #f0f0f0; color: #000; border-left-color: #6e35ff; }
        .category-item.active { background: #7a00f3; color: white; border-left-color: #7700ff; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-item { background: #fff; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); transition: transform 0.3s; }
        .product-item:hover { transform: translateY(-5px); }
        .product-item img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 10px; }
        .product-item h4 { font-size: 14px; margin-bottom: 5px; }
        .product-item .price { color: #ff6b35; font-weight: bold; margin-bottom: 10px; }
        .add-to-cart { background: #4052d6; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .add-to-cart:hover { background: #2e3cb8; }


    </style>
</head>
<body>
    <header>
        <div class="logo"><img src="../Image/logo 2.png" width="182px"></div>
        <input type="checkbox" id="hamburger-toggle" class="hamburger-toggle" hidden>
        <label for="hamburger-toggle" class="hamburger"><span></span><span></span><span></span></label>
        <nav>
            <label for="hamburger-toggle" class="close-btn">✖</label>
            <a href="index.html">Home</a>
            <a href="product.html" style="color: #2e3cb8; text-decoration: underline;">Product</a>
            <a href="contact.html">Contact</a>
            <a href="about.html">About</a>
        </nav>
        <div class="header-right">
            <div class="search">
    <input type="text" id="searchInput" placeholder="Search here" onkeyup="searchProducts()">
    <button style="background: none; color: black;"><i class="fa-solid fa-magnifying-glass"></i></button>
</div>
            <div class="icons">
                <div class="cart-icon-wrapper" onclick="openCart()">
                    <a href="javascript:void(0);"><i class="fas fa-shopping-cart"></i></a>
                    <span class="cart-badge" id="cartBadge">0</span>
                </div>
                <a href="#user"><i class="fas fa-user"></i></a>
            </div>
        </div>
    </header>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Shopping Cart</h2>
                <span class="close-cart" onclick="closeCart()">&times;</span>
            </div>
            <div id="cartItemsContainer"></div>
            <div class="cart-summary" id="cartSummary"></div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <div class="product-page">
        <h1 style="margin-bottom: 30px;"><i class="fas fa-box"></i> All Products</h1>
        <div class="filter-section">
            <div class="filter-box">
                <h3><i class="fas fa-filter"></i> Filter</h3>
                <div class="filter-category">
                    <h4>Category</h4>
                    <div class="category-item active" onclick="filterProducts('all')"><i class="fas fa-th"></i> All</div>
                    <div class="category-item" onclick="filterProducts('electronics')"><i class="fas fa-laptop"></i> Electronics</div>
                    <div class="category-item" onclick="filterProducts('computers')"><i class="fas fa-desktop"></i> Computers</div>
                    <div class="category-item" onclick="filterProducts('accessories')"><i class="fas fa-headphones"></i> Accessories</div>
                    <div class="category-item" onclick="filterProducts('gaming')"><i class="fas fa-gamepad"></i> Gaming</div>
                </div>
            </div>
            <div>
                <div class="products-grid" id="productsGrid"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer">
            <div class="footer-column">
                <img src="../Image/logo 2.png" width="182">
                <p style="font-size: 12px; color: #000; margin-top: 10px;">instagram @nit</p>
            </div>
            <div class="footer-column">
                <h4>SHOP</h4>
                <ul>
                    <li><a href="#">about us</a></li>
                    <li><a href="#">collection</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h4>CONTACT</h4>
                <ul>
                    <li><i class="fas fa-phone"></i> +855 112233445</li>
                    <li><i class="fas fa-envelope"></i> reach3021@gmail.com</li>
                </ul>
            </div>
        </div>
    </footer>
</body>
</html>
<script src="../JS/script.js"></script>
