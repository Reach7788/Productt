<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Methods Demo</title>
</head>
<body>
</body>
</html>
<script>
    // --------- 1. Concat() ---------
    var ArrMethod = ["Java", "JavaScript", "Python", "JavaScript"];
    var NewArr = ['HTML'];
    document.write("<h2>1. Concat()</h2>");
    var ConcatArr = ArrMethod.concat(NewArr);
    document.write(ConcatArr, "<br>");

    // ---------- 2. indexOf() ----------
    document.write("<h2>2. indexOf()</h2>");
    var indexOf = ArrMethod.indexOf("JavaScript");
    document.write(indexOf, "<br>");

    // ------------- 3. find() -----------
    document.write("<h2>3. find()</h2>");
    var FindArr = ArrMethod.find(function(value) {
        return value === "JavaScript";
    });
    document.write(FindArr, "<br>");

    // ---------------- 4. findIndex() ---------
    document.write("<h2>4. findIndex()</h2>");
    var numbers = [1, 2, 3, 4, 5];
    var res = numbers.findIndex(findTwo);
    function findTwo(value) {
        return value == 2;
    }
    document.write(res, "<br>");

    // ------------ 5. forEach() --------
    document.write("<h2>5. forEach()</h2>");
    var numberSecond = [1, 3, 4, 9, 8];
    function computeSquare(element) {
        document.write(element * element, "<br>");
    }
    numberSecond.forEach(computeSquare);

    // -------------- 6. includes() ---------
    document.write("<h2>6. includes()</h2>");
    var languages = ["JavaScript", "Java", "C"];
    var check = languages.includes("Java");
    document.write(check, "<br>");

    // --------- 7. unshift() -----------
    document.write("<h2>7. unshift()</h2>");
    languages.unshift("HTML");
    document.write(languages, "<br>");

    // --------- 8. sort() -----------
    document.write("<h2>8. sort()</h2>");
    let city = ["Phnom Penh", "Takeo", "Prey Veng", "Svay Rieng"];
    let sortedArray = city.sort();
    document.write(sortedArray, "<br>");

    var points = [40, 100, 1, 5, 25, 10];
    points.sort(function(a, b) { return a - b });
    document.write(points, "<br>");

    // --------- 9. slice() ------------
    document.write("<h2>9. slice()</h2>");
    var newArray = points.slice(1, 6);
    document.write(newArray);
</script>


</body>
</html>
