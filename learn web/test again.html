<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Continuous Slider</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
  margin: 0;
  background: #ffffff;
}

.slidetrack {
  display: flex;
  width: calc(400px * 8);
  animation: scroll 20s linear infinite;
  gap: 20px;
}
.slidetrack:hover {
  transform: scale(1.08);
}
.slide2 {
  width: 300px;
  flex-shrink: 0;
  transition: all 0.3s ease;
}

.slide2 img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: 0.3s;
}

/* 👉 hover */
.slide2:hover {
  transform: scale(1.08);
}

.slide:hover img {
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* animation */
@keyframes scroll {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(calc(-420px * 4)); /* half */
  }
}
  </style>
</head>
<body>

<div class="slider">
  <div class="slide-track">
    <div class="slide"><img src="../Image/Advertising  (1).jpg"></div>
    <div class="slide"><img src="../Image/Advertising  (2).jpg"></div>
    <div class="slide"><img src="../Image/Advertising  (3).jpg"></div>
    <div class="slide"><img src="../Image/Advertising  (4).jpg"></div>
    <!-- duplicate for smooth loop -->
    <div class="slide"><img src="../Image/Advertising  (5).jpg"></div>
    <div class="slide"><img src="../Image/Advertising  (6).jpg"></div>
    <div class="slide"><img src="../Image/Advertising  (7).jpg"></div>
    <div class="slide"><img src="../Image/Advertising  (8).jpg"></div>
    <div class="slide"><img src="../Image/Advertising  (9).jpg"></div>
  </div>
</div>
</body>
</html>
<script>
  const track = document.querySelector('.slide-track');
  track.addEventListener('mouseenter', () => {
  track.style.animationPlayState = 'paused';
});

track.addEventListener('mouseleave', () => {
  track.style.animationPlayState = 'running';
});
</script>
