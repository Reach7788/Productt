<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - E-commerce Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <Style>

        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Noto Sans Khmer", sans-serif;
}

body {
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
}

/* NAV (DESKTOP) */
nav {
  display: flex;
  gap: 20px;
}

nav a {
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

nav a.active {
  color: #2e3cb8;
  text-decoration: underline;
}

/* RIGHT SIDE */
.header-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* SEARCH */
.search {
  display: flex;
  border: 1px solid #ccc;
  border-radius: 6px;
  overflow: hidden;
}

.search input {
  border: none;
  padding: 6px 10px;
  outline: none;
  width: 140px;
}

.search button {
  border: none;
  background: none;
  padding: 6px 10px;
  cursor: pointer;
}

/* ICONS */
.icons a {
  margin-left: 10px;
  color: #333;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.hamburger span {
  width: 25px;
  height: 3px;
  background: black;
  margin: 4px 0;
}

/* CLOSE BTN */
.close-btn {
  display: none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  /* hide desktop nav */
  nav {
    position: fixed;
    top: 0;
    right: -260px;
    width: 240px;
    height: 100%;
    background: #fff;
    flex-direction: column;
    padding-top: 60px;
    transition: 0.3s;
    z-index: 1000;
  }

  nav a {
    padding: 15px;
    border-bottom: 1px solid #ddd;
  }

  /* show hamburger */
  .hamburger {
    display: flex;
  }

  /* hide search text a bit */
  .search input {
    width: 100px;
  }

  /* when open */
  #hamburger-toggle:checked ~ nav {
    right: 0;
  }

  #hamburger-toggle:checked ~ .overlay {
    opacity: 1;
    pointer-events: auto;
  }

  #hamburger-toggle:checked ~ nav .close-btn {
    display: block;
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 24px;
    cursor: pointer;
  }

  /* header layout fix */
  .header-right {
    width: 100%;
    margin-top: 10px;
    justify-content: space-between;
  }
}


@media (max-width: 768px) {

  .search {
    max-width: 100%;
  }

  .hero {
    flex-direction: column;
    text-align: center;
  }

  .hero-text h1 {
    font-size: 22px;
  }

  .hero-text h2 {
    font-size: 26px;
  }

  .hero-img img {
    width: 180px;
    margin-top: 15px;
  }

  .icons {
    display: none;
  }

  .hamburger {
    display: block;
  }
}
    </Style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
