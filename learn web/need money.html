<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>គណនាប្រាក់បំណុល</title>
  <style>
    body {
      font-family: 'hanuman', sans-serif;
      background: #f4f4f4;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h2 { text-align: center; color: #2c3e50; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button {
      margin-top: 15px; padding: 10px; width: 100%;
      background: #3498db; color: white; border: none;
      font-size: 16px; cursor: pointer;
    }
    .summary {
      margin-top: 20px; background: #ecf0f1;
      padding: 15px; border-radius: 8px;
    }
    .summary p { font-size: 16px; margin: 5px 0; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #2980b9; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h2>គណនាប្រាក់បំណុល</h2>
    <label>ចំនួនប្រាក់ខែ ($):</label>
    <input type="number" id="loanAmount" value="">
    <label>រយៈពេលខែ (ឆ្នាំ):</label>
    <input type="number" id="loanYears" value="">
    <label>រយៈពេលខែ (ខែ):</label>
    <input type="number" id="loanMonths" value="">
    <label>អត្រាការប្រាក់ (%):</label>
    <input type="number" id="interestRate" value="">
    <button onclick="calculateLoan()">គណនា</button>

    <div class="summary" id="summary"></div>

    <table id="amortizationTable">
      <thead>
        <tr>
          <th>#</th>
          <th>ការបង់ប្រាក់</th>
          <th>ប្រាក់ដើម</th>
          <th>ការប្រាក់</th>
          <th>សមតុល្យ</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
  function calculateLoan() {
    const amount = parseFloat(document.getElementById('loanAmount').value);
    const years = parseInt(document.getElementById('loanYears').value) || 0;
    const monthsInput = parseInt(document.getElementById('loanMonths').value) || 0;
    const rate = parseFloat(document.getElementById('interestRate').value);

    const totalMonths = monthsInput > 0 ? monthsInput : years * 12;
    const monthlyRate = rate / 100 / 12;

    const monthlyPayment = (amount * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -totalMonths));
    const totalPayment = monthlyPayment * totalMonths;
    const totalInterest = totalPayment - amount;

    // ✅ FIX HERE
    document.getElementById('summary').innerHTML = `
      <p>កោរបង់ប្រចាំខែ: $${monthlyPayment.toFixed(2)}</p>
      <p>បង់សរុប: $${totalPayment.toFixed(2)}</p>
      <p>ការប្រាក់សរុប: $${totalInterest.toFixed(2)}</p>
    `;

    const tbody = document.querySelector('#amortizationTable tbody');
    tbody.innerHTML = '';

    let balance = amount;

    for (let i = 1; i <= totalMonths; i++) {
      const interest = balance * monthlyRate;
      const principal = monthlyPayment - interest;
      balance -= principal;

      // ✅ FIX HERE
      tbody.innerHTML += `
        <tr>
          <td>${i}</td>
          <td>$${monthlyPayment.toFixed(2)}</td>
          <td>$${principal.toFixed(2)}</td>
          <td>$${interest.toFixed(2)}</td>
          <td>$${balance.toFixed(2)}</td>
        </tr>
      `;
    }
  }
</script>
</body>
</html>
